name: Tests

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]
  release:
    types: [ published ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run go mod tidy
        run: go mod tidy

      - name: Run tests
        run: go test ./tests/... -v -cover

      - name: Build
        run: go build ./...